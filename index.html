<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>김프자동매매 · 자산 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<script>document.write('<script src="data.js?v=' + Date.now() + '" onerror="window.__DATA_MISSING=true"><\/script>');</script>
<style>
  :root {
    --bg: #0b0d12;
    --surface: #12151c;
    --surface-2: #1a1e28;
    --border: #262b38;
    --text: #e6e9f2;
    --text-dim: #8a92a6;
    --accent: #6ea8ff;
    --up: #2ecc71;
    --down: #ff5a6a;
    --gain-1: #0f3a22;
    --gain-2: #1a6b3f;
    --gain-3: #27a560;
    --gain-4: #3fd987;
    --loss-1: #3a0f14;
    --loss-2: #6b1a25;
    --loss-3: #a5273a;
    --loss-4: #d93f58;
    --neutral: #1d2230;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-feature-settings: 'tnum' on, 'lnum' on;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 80px; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
  header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  header .sub { color: var(--text-dim); font-size: 13px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
    background: var(--surface-2); color: var(--text-dim); font-size: 12px; border: 1px solid var(--border); }
  .pill.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--up); box-shadow: 0 0 8px var(--up); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
  .card .label { color: var(--text-dim); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
  .card .value { font-size: 28px; font-weight: 700; margin-top: 8px; letter-spacing: -0.02em; }
  .card .value .unit { font-size: 14px; color: var(--text-dim); font-weight: 500; margin-left: 4px; }
  .card .delta { margin-top: 6px; font-size: 13px; font-weight: 600; }
  .card .delta.up { color: var(--up); }
  .card .delta.down { color: var(--down); }
  .card .delta.flat { color: var(--text-dim); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 20px; }
  .section h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

  /* calendar heatmap */
  .heatmap { display: flex; gap: 14px; }
  .heatmap .months { display: flex; gap: 4px; }
  .heatmap .month { display: flex; flex-direction: column; gap: 2px; }
  .heatmap .month-label { color: var(--text-dim); font-size: 11px; text-align: center; margin-bottom: 4px; min-height: 14px; }
  .heatmap .week { display: flex; flex-direction: column; gap: 3px; }
  .heatmap .cell { width: 14px; height: 14px; border-radius: 3px; background: var(--neutral); cursor: pointer; transition: transform .08s ease; }
  .heatmap .cell:hover { transform: scale(1.35); outline: 1px solid var(--text); }
  .heatmap .cell.empty { background: transparent; cursor: default; }
  .heatmap-legend { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 11px; margin-top: 14px; }
  .heatmap-legend .swatches { display: flex; gap: 3px; }
  .heatmap-legend .sw { width: 12px; height: 12px; border-radius: 3px; }

  /* day labels */
  .heatmap .day-labels { display: flex; flex-direction: column; gap: 3px; padding-top: 18px; color: var(--text-dim); font-size: 11px; }
  .heatmap .day-labels span { height: 14px; line-height: 14px; }

  /* chart */
  .chart-wrap { position: relative; height: 260px; }

  /* log table */
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .log-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .log-table td.up { color: var(--up); }
  .log-table td.down { color: var(--down); }

  /* tooltip */
  #tooltip { position: fixed; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity .08s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100; }
  #tooltip .t-date { color: var(--text-dim); margin-bottom: 4px; font-size: 11px; }
  #tooltip .t-val { font-weight: 600; }

  @media (max-width: 900px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>김프자동매매 · 자산 대시보드</h1>
      <div class="sub">테더(USDT) 환산 기준 · 일일 증감</div>
    </div>
    <div>
      <span class="pill live" id="statusPill">동기화 중…</span>
      <span class="pill" id="lastUpdated">마지막 업데이트 —</span>
    </div>
  </header>

  <!-- 요약 카드 -->
  <div class="cards">
    <div class="card">
      <div class="label">현재 자산</div>
      <div class="value" id="nowValue">—<span class="unit">원</span></div>
      <div class="delta flat" id="nowKrw">≈ — USDT</div>
    </div>
    <div class="card">
      <div class="label">오늘 증감</div>
      <div class="value" id="todayValue">—<span class="unit">USDT</span></div>
      <div class="delta flat" id="todayPct">—</div>
    </div>
    <div class="card">
      <div class="label">최근 7일</div>
      <div class="value" id="weekValue">—<span class="unit">USDT</span></div>
      <div class="delta flat" id="weekPct">—</div>
    </div>
    <div class="card">
      <div class="label">이번 달</div>
      <div class="value" id="monthValue">—<span class="unit">USDT</span></div>
      <div class="delta flat" id="monthPct">—</div>
    </div>
  </div>

  <!-- 일별 자산 추이 차트 -->
  <div class="section">
    <h2>일별 자산 추이 (USDT)</h2>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </div>

  <!-- 캘린더 히트맵 + 최근 로그 -->
  <div class="grid-2">
    <div class="section">
      <h2>일별 증감 캘린더</h2>
      <div class="heatmap">
        <div class="day-labels">
          <span></span><span>월</span><span></span><span>수</span><span></span><span>금</span><span></span>
        </div>
        <div class="months" id="heatmap"></div>
      </div>
      <div class="heatmap-legend">
        <span>손실</span>
        <div class="swatches">
          <div class="sw" style="background: var(--loss-4)"></div>
          <div class="sw" style="background: var(--loss-3)"></div>
          <div class="sw" style="background: var(--loss-2)"></div>
          <div class="sw" style="background: var(--neutral)"></div>
          <div class="sw" style="background: var(--gain-2)"></div>
          <div class="sw" style="background: var(--gain-3)"></div>
          <div class="sw" style="background: var(--gain-4)"></div>
        </div>
        <span>수익</span>
      </div>
    </div>

    <div class="section">
      <h2>최근 일별 로그</h2>
      <table class="log-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th style="text-align:right">USDT 환산</th>
            <th style="text-align:right">증감</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="tooltip"><div class="t-date"></div><div class="t-val"></div></div>

<script>
// ---------- 데이터 로드 (data.js가 parse_logs.py로 생성됨) ----------
function generateMock() {
  const days = 90;
  const out = [];
  let v = 80000;
  const start = luxon.DateTime.now().minus({ days: days - 1 }).startOf('day');
  for (let i = 0; i < days; i++) {
    const dt = start.plus({ days: i });
    const weekendMute = (dt.weekday >= 6) ? 0.4 : 1.0;
    const shock = (Math.random() - 0.5) * 600 * weekendMute;
    v = Math.max(50000, v + 25 + shock);
    out.push({ date: dt.toISODate(), usdt: Math.round(v * 100) / 100 });
  }
  return out;
}

const RAW = window.DASHBOARD_DATA || null;
const IS_REAL = !!RAW;
const DATA = IS_REAL
  ? RAW.daily.map(d => ({ date: d.date, usdt: d.close, fx: d.fx_close, totalKrw: d.total_krw_close, krwUpbit: d.krw_upbit_close, usdBitget: d.usd_bitget_close, changePct: d.change_pct }))
  : generateMock();
let LATEST_FX = IS_REAL && RAW.daily.length ? RAW.daily[RAW.daily.length - 1].fx_close : 1482;
let LIVE_TETHER = null;

async function fetchLiveTether() {
  try {
    const res = await fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT', { cache: 'no-store' });
    const data = await res.json();
    LIVE_TETHER = data[0].trade_price;
    return LIVE_TETHER;
  } catch (e) {
    console.warn('Failed to fetch live tether:', e);
    return null;
  }
}

// ---------- 렌더 ----------
function fmtUsdt(n) { return n.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPct(p) { const s = (p >= 0 ? '+' : ''); return s + p.toFixed(2) + '%'; }
function fmtKrw(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }

function renderSummary() {
  if (DATA.length === 0) return;
  const last = DATA[DATA.length - 1];
  const prev = DATA[DATA.length - 2] || last;
  const weekAgo = DATA[Math.max(0, DATA.length - 8)] || last;
  const monthStart = (() => {
    const today = luxon.DateTime.fromISO(last.date);
    const first = today.startOf('month').toISODate();
    return DATA.find(d => d.date >= first) || last;
  })();

  const tether = LIVE_TETHER || last.fx || LATEST_FX;
  const liveTotalKrw = (last.krwUpbit != null && last.usdBitget != null)
    ? last.krwUpbit + last.usdBitget * tether
    : (last.totalKrw || (last.usdt * LATEST_FX));
  const liveUsdt = liveTotalKrw / tether;
  const tetherSrc = LIVE_TETHER ? '실시간' : '로그';

  document.getElementById('nowValue').innerHTML = Math.round(liveTotalKrw).toLocaleString('ko-KR') + '<span class="unit"> 원</span>';
  document.getElementById('nowKrw').textContent = '≈ ' + fmtUsdt(liveUsdt) + ' USDT (테더 ' + tether.toLocaleString('ko-KR') + '원 · ' + tetherSrc + ')';

  setDelta('today',  last.usdt - prev.usdt,       prev.usdt);
  setDelta('week',   last.usdt - weekAgo.usdt,    weekAgo.usdt);
  setDelta('month',  last.usdt - monthStart.usdt, monthStart.usdt);

  const generated = IS_REAL ? RAW.generated_at.replace('T',' ') : '';
  document.getElementById('lastUpdated').textContent = '데이터 ' + last.date + (generated ? ' · 생성 ' + generated : '');
  const pill = document.getElementById('statusPill');
  pill.textContent = IS_REAL ? ('실시간 · ' + RAW.source + ' · ' + RAW.count_series + ' samples') : '목업 데이터';
  pill.classList.toggle('live', IS_REAL);
}

function setDelta(prefix, diff, base) {
  const valEl = document.getElementById(prefix + 'Value');
  const pctEl = document.getElementById(prefix + 'Pct');
  const sign = diff >= 0 ? '+' : '';
  const cls  = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
  valEl.innerHTML = sign + fmtUsdt(diff) + '<span class="unit"> USDT</span>';
  pctEl.textContent = fmtPct(base === 0 ? 0 : (diff / base) * 100);
  pctEl.className = 'delta ' + cls;
  valEl.style.color = cls === 'up' ? 'var(--up)' : cls === 'down' ? 'var(--down)' : 'var(--text)';
}

// 일별 증감률로 색 결정
function cellColor(pct) {
  if (pct == null) return 'var(--neutral)';
  const abs = Math.abs(pct);
  if (abs < 0.2) return 'var(--neutral)';
  if (pct > 0) {
    if (abs < 0.5) return 'var(--gain-1)';
    if (abs < 1.0) return 'var(--gain-2)';
    if (abs < 2.0) return 'var(--gain-3)';
    return 'var(--gain-4)';
  } else {
    if (abs < 0.5) return 'var(--loss-1)';
    if (abs < 1.0) return 'var(--loss-2)';
    if (abs < 2.0) return 'var(--loss-3)';
    return 'var(--loss-4)';
  }
}

function renderHeatmap() {
  // 최근 90일을 주별 열(7칸) 단위로, 월 단위 그룹
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  if (DATA.length === 0) return;

  // 날짜→증감% 매핑
  const pctMap = {};
  for (let i = 0; i < DATA.length; i++) {
    if (i === 0) { pctMap[DATA[i].date] = null; continue; }
    const prev = DATA[i-1].usdt;
    pctMap[DATA[i].date] = prev === 0 ? 0 : ((DATA[i].usdt - prev) / prev) * 100;
  }

  const start = luxon.DateTime.fromISO(DATA[0].date);
  const end   = luxon.DateTime.fromISO(DATA[DATA.length - 1].date);

  // 주 시작 = 일요일로 정렬
  let cursor = start.minus({ days: start.weekday % 7 });
  const endPad = end.plus({ days: 6 - (end.weekday % 7) });

  let currentMonth = null;
  let monthEl = null;
  let weekEl = null;

  while (cursor <= endPad) {
    // 새 주 시작
    if (cursor.weekday % 7 === 0) {
      const monthKey = cursor.toFormat('yyyy-MM');
      if (monthKey !== currentMonth) {
        currentMonth = monthKey;
        monthEl = document.createElement('div');
        monthEl.className = 'month';
        const lbl = document.createElement('div');
        lbl.className = 'month-label';
        lbl.textContent = cursor.toFormat('M월');
        monthEl.appendChild(lbl);
        container.appendChild(monthEl);
      }
      weekEl = document.createElement('div');
      weekEl.className = 'week';
      monthEl.appendChild(weekEl);
    }

    const iso = cursor.toISODate();
    const cell = document.createElement('div');
    cell.className = 'cell';
    const inRange = (cursor >= start && cursor <= end);
    if (!inRange) {
      cell.classList.add('empty');
    } else {
      const pct = pctMap[iso];
      cell.style.background = cellColor(pct);
      const d = DATA.find(x => x.date === iso);
      cell.dataset.date = iso;
      cell.dataset.usdt = d ? d.usdt : '';
      cell.dataset.pct  = pct == null ? '' : pct.toFixed(2);
      cell.addEventListener('mousemove', onCellHover);
      cell.addEventListener('mouseleave', onCellLeave);
    }
    weekEl.appendChild(cell);
    cursor = cursor.plus({ days: 1 });
  }
}

const tt = document.getElementById('tooltip');
function onCellHover(e) {
  const d = e.currentTarget;
  const pct = d.dataset.pct;
  const usdt = d.dataset.usdt;
  if (!d.dataset.date) return;
  tt.querySelector('.t-date').textContent = d.dataset.date;
  const pctHtml = pct === '' ? '기준일' :
    '<span style="color:' + (parseFloat(pct) >= 0 ? 'var(--up)' : 'var(--down)') + '">' +
    (parseFloat(pct) >= 0 ? '+' : '') + pct + '%</span>';
  tt.querySelector('.t-val').innerHTML = fmtUsdt(parseFloat(usdt)) + ' USDT · ' + pctHtml;
  tt.style.left = (e.clientX + 12) + 'px';
  tt.style.top  = (e.clientY + 12) + 'px';
  tt.style.opacity = 1;
}
function onCellLeave() { tt.style.opacity = 0; }

function renderChart() {
  const ctx = document.getElementById('lineChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 260);
  grad.addColorStop(0, 'rgba(110,168,255,0.35)');
  grad.addColorStop(1, 'rgba(110,168,255,0)');

  // 실데이터면 intraday 5분봉, 아니면 일별
  const points = (IS_REAL && RAW.series.length)
    ? RAW.series.map(s => ({ x: s.ts, y: s.total_usdt }))
    : DATA.map(d => ({ x: d.date, y: d.usdt }));

  // 기간에 따라 축 단위 자동
  const span = points.length
    ? luxon.DateTime.fromISO(points[points.length-1].x).diff(luxon.DateTime.fromISO(points[0].x), 'days').days
    : 7;
  const xUnit = span <= 2 ? 'hour' : span <= 14 ? 'day' : span <= 60 ? 'week' : 'month';
  const xFmt  = { hour: 'HH:mm', day: 'M/d', week: 'M/d', month: 'yyyy-MM' }[xUnit];

  new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'USDT 환산 자산',
        data: points,
        borderColor: '#6ea8ff',
        backgroundColor: grad,
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.1,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1e28',
          borderColor: '#262b38', borderWidth: 1,
          titleColor: '#8a92a6', bodyColor: '#e6e9f2',
          padding: 10, displayColors: false,
          callbacks: {
            title: items => items[0].parsed.x ? luxon.DateTime.fromMillis(items[0].parsed.x).toFormat('yyyy-MM-dd HH:mm') : '',
            label: ctx => fmtUsdt(ctx.parsed.y) + ' USDT'
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: xUnit, displayFormats: { [xUnit]: xFmt } },
          grid: { color: '#1a1e28' },
          ticks: { color: '#8a92a6', font: { size: 11 }, maxRotation: 0 }
        },
        y: {
          grid: { color: '#1a1e28' },
          ticks: { color: '#8a92a6', font: { size: 11 }, callback: v => (v/1000).toFixed(1) + 'k' }
        }
      }
    }
  });
}

function renderLogTable() {
  const body = document.getElementById('logBody');
  body.innerHTML = '';
  const last = DATA.slice(-14).reverse();
  last.forEach((d, idx) => {
    const prev = DATA[DATA.length - last.length + (last.length - 1 - idx) - 1];
    const diff = prev ? d.usdt - prev.usdt : null;
    const cls = diff == null ? 'flat' : diff > 0 ? 'up' : 'down';
    const sign = diff == null ? '' : (diff >= 0 ? '+' : '');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${d.date}</td>
      <td class="num">${fmtUsdt(d.usdt)}</td>
      <td class="num ${cls}">${diff == null ? '—' : sign + fmtUsdt(diff)}</td>`;
    body.appendChild(tr);
  });
}

renderSummary();
renderHeatmap();
renderChart();
renderLogTable();

fetchLiveTether().then(() => renderSummary());
setInterval(() => fetchLiveTether().then(() => renderSummary()), 30000);
</script>
</body>
</html>
